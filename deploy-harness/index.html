<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeSealed — Midnight Preprod Deployment | Level 1</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        margin: 0;
        padding: 40px;
        display: flex;
        justify-content: center;
      }
      .container {
        max-width: 680px;
        width: 100%;
        background: #1e293b;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        border: 1px solid #334155;
      }
      h1 { margin-top: 0; color: #38bdf8; font-size: 1.8rem; }
      p { line-height: 1.5; color: #cbd5e1; }
      .badge { display: inline-block; background: #0369a1; color: white; padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; margin-bottom: 16px; }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #2563eb; }
      button:disabled { background: #64748b; cursor: not-allowed; }
      .success-box {
        margin-top: 24px;
        padding: 16px;
        background: #065f46;
        border: 1px solid #059669;
        border-radius: 8px;
      }
      .log-box {
        margin-top: 20px;
        background: #090d16;
        padding: 16px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 0.85rem;
        color: #10b981;
        white-space: pre-wrap;
        max-height: 250px;
        overflow-y: auto;
      }
      a { color: #38bdf8; text-decoration: none; font-weight: bold; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
